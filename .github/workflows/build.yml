name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Essential to authorize uploading binary assets to GitHub Releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: DocsTool-Linux
            release_name: DocsTool-Linux
          - os: windows-latest
            artifact_name: DocsTool-Windows
            release_name: DocsTool-Windows.exe
          - os: macos-latest
            artifact_name: DocsTool-MacOS
            release_name: DocsTool-MacOS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Stable target Python environment for all platforms

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Package with PyInstaller
      run: |
        python build.py

    - name: Rename binary for release
      shell: bash
      run: |
        cd dist
        # Windows creates DocsTool.exe, Linux/Mac creates DocsTool
        # We rename them to unique names to avoid macOS and Linux overwriting each other
        if [ -f "DocsTool.exe" ]; then
          mv DocsTool.exe ${{ matrix.release_name }}
        elif [ -f "DocsTool" ]; then
          mv DocsTool ${{ matrix.release_name }}
        fi

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.release_name }}

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/${{ matrix.release_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
