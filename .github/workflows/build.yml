name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
    inputs:
      tag_name:
        description: '배포할 릴리즈 태그 이름 (예: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # Essential to authorize uploading binary assets to GitHub Releases

env:
  PYTHONIOENCODING: utf-8 # Prevents UnicodeEncodeError crashes on Windows runners

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: EasyPDFTool-Linux
            release_name: EasyPDFTool-Linux
          - os: windows-latest
            artifact_name: EasyPDFTool-Windows
            release_name: EasyPDFTool-Windows.exe
          - os: macos-latest
            artifact_name: EasyPDFTool-MacOS
            release_name: EasyPDFTool-MacOS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Stable target Python environment for all platforms

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Package with PyInstaller
      run: |
        python build.py

    - name: Rename binary for release
      shell: bash
      run: |
        cd dist
        # Windows creates EasyPDFTool.exe, Linux/Mac creates EasyPDFTool
        if [ -f "EasyPDFTool.exe" ]; then
          mv EasyPDFTool.exe ${{ matrix.release_name }}
        elif [ -f "EasyPDFTool" ]; then
          mv EasyPDFTool ${{ matrix.release_name }}
        fi

    - name: Build MSIX Package (Windows only)
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        # Create staging directory for MSIX build
        New-Item -ItemType Directory -Force -Path dist/msix_build
        
        # Copy built executable and rename it to match AppxManifest target
        Copy-Item -Path dist/${{ matrix.release_name }} -Destination dist/msix_build/EasyPDFTool.exe
        
        # Copy store manifest and assets
        Copy-Item -Path AppxManifest.xml -Destination dist/msix_build/
        Copy-Item -Path msix_assets -Destination dist/msix_build/ -Recurse
        
        # Find makeappx.exe path dynamically from Windows Kits
        $makeappx = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1).FullName
        if (-not $makeappx) {
            $makeappx = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse | Select-Object -First 1).FullName
        }
        
        Write-Host "Using makeappx at: $makeappx"
        & $makeappx pack /d dist/msix_build /p dist/EasyPDFTool.msix
        Write-Host "MSIX compilation completed successfully."

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/${{ matrix.release_name }}
          dist/*.msix

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      # Run if triggered by pushing a tag OR manually via workflow_dispatch
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
        name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        draft: false
        prerelease: false
        files: |
          dist/${{ matrix.release_name }}
          dist/*.msix
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

