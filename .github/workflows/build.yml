name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: DocsTool-Linux
            output_name: DocsTool
          - os: windows-latest
            artifact_name: DocsTool-Windows
            output_name: DocsTool.exe
          - os: macos-latest
            artifact_name: DocsTool-MacOS
            output_name: DocsTool

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Stable target Python environment for all platforms

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Package with PyInstaller
      run: |
        python build.py

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/${{ matrix.output_name }}
          dist/${{ matrix.output_name }}.exe
        if-no-files-found: ignore
