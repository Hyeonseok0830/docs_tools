name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
    inputs:
      tag_name:
        description: '배포할 릴리즈 태그 이름 (예: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # Essential to authorize uploading binary assets to GitHub Releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: DocsTool-Linux
            release_name: DocsTool-Linux
          - os: windows-latest
            artifact_name: DocsTool-Windows
            release_name: DocsTool-Windows.exe
          - os: macos-latest
            artifact_name: DocsTool-MacOS
            release_name: DocsTool-MacOS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Upgraded from v3 to resolve deprecation

    - name: Set up Python
      uses: actions/setup-python@v5 # Upgraded from v4 to resolve deprecation
      with:
        python-version: '3.11' # Stable target Python environment for all platforms

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Package with PyInstaller
      run: |
        python build.py

    - name: Rename binary for release
      shell: bash
      run: |
        cd dist
        # Windows creates DocsTool.exe, Linux/Mac creates DocsTool
        if [ -f "DocsTool.exe" ]; then
          mv DocsTool.exe ${{ matrix.release_name }}
        elif [ -f "DocsTool" ]; then
          mv DocsTool ${{ matrix.release_name }}
        fi

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v4 # Upgraded from v3 to resolve deprecation
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.release_name }}

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2 # Upgraded from v1 to resolve deprecation
      # Run if triggered by pushing a tag OR manually via workflow_dispatch
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
        name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        draft: false
        prerelease: false
        files: dist/${{ matrix.release_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
